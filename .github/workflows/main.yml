name: Deploiement Site Statique

on:
  push:
    branches: ["main"]

# Autorisations nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v4

      - name: Création de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          # On indique le dossier où se trouve votre index.html
          # '.' signifie la racine du dépôt
          path: '.' 

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4